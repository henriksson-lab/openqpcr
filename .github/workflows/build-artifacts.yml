name: Build artifacts

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: "0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-exe:
    name: Windows executables
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release -p openqpcr-gui -p openqpcr

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/release/openqpcr-gui.exe "dist/openqpcr-gui.exe"
          Copy-Item target/release/openqpcr.exe "dist/openqpcr.exe"
          Compress-Archive -Path "dist/openqpcr-gui.exe","dist/openqpcr.exe" -DestinationPath openqpcr-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openqpcr-windows-x64
          path: openqpcr-windows-x64.zip
          retention-days: 14

  macos-app:
    name: macOS app bundle
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build app bundle
        run: make osx-app

      - name: Package
        run: ditto -c -k --sequesterRsrc --keepParent "target/osx/openqpcr.app" openqpcr-macos.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openqpcr-macos
          path: openqpcr-macos.zip
          retention-days: 14

  linux-deb:
    name: Linux .deb package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev

      - name: Build .deb
        run: make deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openqpcr-linux-deb
          path: dist/*.deb
          retention-days: 14

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows-exe, macos-app, linux-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openqpcr-*
          path: dist
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.deb
